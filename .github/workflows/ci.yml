name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint backend
        run: python -m ruff check app tests

      - name: Smoke test migrations
        run: DATABASE_URL=sqlite:////tmp/gametracker-ci-alembic.sqlite3 python scripts/manage_db.py upgrade

      - name: Verify schema is current
        run: DATABASE_URL=sqlite:////tmp/gametracker-ci-alembic.sqlite3 python scripts/manage_db.py check-current

      - name: Run backend tests
        run: python -m pytest -q

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
