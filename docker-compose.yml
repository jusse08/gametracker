services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gametracker-backend
    restart: unless-stopped
    volumes:
      - gametracker_data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/database.db
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    networks:
      - gametracker-network
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000/api
    container_name: gametracker-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gametracker-network

networks:
  gametracker-network:
    driver: bridge

volumes:
  gametracker_data:
    driver: local
