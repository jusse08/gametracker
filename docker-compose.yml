services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gametracker-backend
    restart: unless-stopped
    volumes:
      - ./gametracker_data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/database.db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-access_token}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-change-me}
      SECRET_KEY: ${SECRET_KEY:-change-me-long-random-secret}
    networks:
      - gametracker-network
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://localhost:%s/ready' % os.getenv('BACKEND_PORT','8000'))\""]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
    container_name: gametracker-frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - \"http://localhost:${FRONTEND_PORT:-3000}\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
    networks:
      - gametracker-network

networks:
  gametracker-network:
    driver: bridge
