services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gametracker-backend
    restart: unless-stopped
    volumes:
      - gametracker_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/database.db
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://your-server-ip:3000,http://your-server-ip:5173
    networks:
      - gametracker-network
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gametracker-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gametracker-network
    environment:
      - VITE_API_BASE=http://localhost:8000/api

networks:
  gametracker-network:
    driver: bridge

volumes:
  gametracker_data:
    driver: local
