services:
  agent-builder:
    build:
      context: .
      dockerfile: agent/Dockerfile.windows-builder
    container_name: gametracker-agent-builder
    restart: "no"
    volumes:
      - ./gametracker_data:/out
    networks:
      - gametracker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gametracker-backend
    restart: unless-stopped
    volumes:
      - ./gametracker_data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/database.db
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      agent-builder:
        condition: service_completed_successfully
    networks:
      - gametracker-network
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000/api
    container_name: gametracker-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gametracker-network

networks:
  gametracker-network:
    driver: bridge
